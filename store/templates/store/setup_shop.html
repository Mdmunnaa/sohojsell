<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Shop - SohojSell</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #f4f7f6 0%, #e0eafc 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; padding: 20px 0;}
        .login-card { border: none; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); overflow: hidden; background: #fff; max-width: 900px; width: 100%; }
        .login-left { background: linear-gradient(135deg, #198754 0%, #0d6efd 100%); color: white; padding: 50px; display: flex; flex-direction: column; justify-content: center; }
        .login-right { padding: 50px; }
        .form-control { border-radius: 10px; padding: 12px 15px; border: 1px solid #dee2e6; background-color: #f8f9fa; }
        .form-control:focus { border-color: #198754; box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, 0.2); background-color: #fff; }
        .btn-signup { border-radius: 10px; padding: 12px; font-weight: bold; background-color: #198754; color: white; border: none;}
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="login-card row g-0">
                    <div class="col-md-5 login-left d-none d-md-flex">
                        <h2 class="fw-bolder mb-3"><i class="bi bi-shop text-warning me-2"></i>Step 2</h2>
                        <h4 class="fw-bold opacity-75 mb-4">Setup Your Shop</h4>
                        <p class="small opacity-75">দোকানের তথ্যগুলো দিন। এই তথ্যগুলো আপনার ইনভয়েস বা মেমোতে প্রিন্ট হবে।</p>
                    </div>
                    <div class="col-md-7 login-right">
                        <div class="text-center mb-4">
                            <h3 class="fw-bolder text-dark">Shop Details 🏪</h3>
                        </div>

                        {% if messages %}
                            {% for message in messages %}
                                <div class="alert alert-{{ message.tags }} alert-dismissible fade show rounded-3 small" role="alert">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                </div>
                            {% endfor %}
                        {% endif %}

                        <form method="POST" action="{% url 'setup_shop' %}">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary small">Shop Name (দোকানের নাম)</label>
                                <input type="text" name="shop_name" class="form-control" placeholder="e.g. FashionBD" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary small">Full Address (ঠিকানা)</label>
                                <input type="text" name="address" class="form-control" placeholder="Shop #12, Block C, Dhaka" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold text-secondary small">Facebook Page Link (Optional)</label>
                                <input type="url" name="fb_link" class="form-control" placeholder="https://facebook.com/yourpage">
                            </div>
                            <button type="submit" class="btn btn-signup w-100 shadow-sm"><i class="bi bi-check-circle-fill me-2"></i> Finish & Go to Dashboard</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
