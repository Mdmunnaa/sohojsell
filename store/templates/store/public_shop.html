<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ shop.name }} - Storefront</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .store-header { background: linear-gradient(135deg, #0d6efd 0%, #0043a8 100%); color: white; padding: 40px 0; border-bottom: 5px solid #fd7e14;}
        .product-card { transition: transform 0.2s, box-shadow 0.2s; border: none; border-radius: 15px; overflow: hidden;}
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .product-img-placeholder { background-color: #e9ecef; height: 200px; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: #adb5bd;}
        .price-tag { font-size: 1.25rem; font-weight: 800; color: #198754; }
    </style>
</head>
<body>

    <header class="store-header text-center shadow-sm">
        <div class="container">
            <h1 class="display-5 fw-bolder mb-2"><i class="bi bi-shop me-3 text-warning"></i>{{ shop.name }}</h1>
            <p class="lead mb-0 opacity-75"><i class="bi bi-geo-alt-fill me-1"></i> {{ shop.address }} | <i class="bi bi-telephone-fill ms-2 me-1"></i> {{ shop.phone }}</p>
        </div>
    </header>

    <div class="container py-5">
        <div class="row mb-4">
            <div class="col-12">
                <h4 class="fw-bold text-dark border-bottom pb-2">Our Latest Collection</h4>
            </div>
        </div>

        <div class="row g-4">
            {% for product in products %}
            <div class="col-md-4 col-lg-3">
                <div class="card product-card h-100 shadow-sm">
                    <div class="product-img-placeholder">
                        <i class="bi bi-box-seam"></i>
                    </div>

                    <div class="card-body d-flex flex-column">
                        <h6 class="card-title fw-bold text-dark mb-1">{{ product.name }}</h6>
                        <p class="text-muted small mb-3">Stock: <span class="badge bg-light text-dark">{{ product.stock_quantity }} Available</span></p>

                        <div class="mt-auto d-flex justify-content-between align-items-center">
                            <span class="price-tag">৳{{ product.price }}</span>
                            <button class="btn btn-primary rounded-pill fw-bold px-3 btn-sm shadow-sm">
                                <i class="bi bi-cart-plus me-1"></i> Buy Now
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="col-12 text-center py-5">
                <h3 class="text-muted"><i class="bi bi-emoji-frown me-2"></i>No products available right now.</h3>
            </div>
            {% endfor %}
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <div class="container">
            <p class="mb-0 small">Powered by <span class="fw-bold text-warning">SohojSell SaaS</span></p>
        </div>
    </footer>

</body>
</html>
