{% extends 'store/base.html' %}
{% block title %}Delete Product{% endblock %}

{% block content %}
<div class="card shadow-sm border-0 border-top border-danger border-4 mx-auto mt-5" style="max-width: 500px;">
    <div class="card-body text-center p-5">
        <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 3rem;"></i>
        <h4 class="fw-bold mt-3">Are you sure?</h4>
        <p class="text-muted">Do you really want to delete <strong>"{{ product.name }}"</strong>? This process cannot be undone.</p>

        <form method="POST" class="mt-4">
            {% csrf_token %}
            <a href="{% url 'product_list' %}" class="btn btn-secondary fw-bold px-4 me-2">Cancel</a>
            <button type="submit" class="btn btn-danger fw-bold px-4">Yes, Delete it</button>
        </form>
    </div>
</div>
{% endblock %}
