<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Free Shop - SohojSell</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #f4f7f6 0%, #e0eafc 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; padding: 20px 0; }
        .login-card { border: none; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); overflow: hidden; background: #fff; max-width: 900px; width: 100%; }
        .login-left { background: linear-gradient(135deg, #fd7e14 0%, #d9534f 100%); color: white; padding: 50px; display: flex; flex-direction: column; justify-content: center; }
        .login-right { padding: 50px; }
        .form-control { border-radius: 10px; padding: 12px 15px; border: 1px solid #dee2e6; background-color: #f8f9fa; }
        .form-control:focus { border-color: #fd7e14; box-shadow: 0 0 0 0.25rem rgba(253, 126, 20, 0.2); background-color: #fff; }
        .btn-signup { border-radius: 10px; padding: 12px; font-weight: bold; background-color: #fd7e14; color: white; border: none;}
        .btn-signup:hover { background-color: #e86b0c; color: white;}
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="login-card row g-0">
                    <div class="col-md-6 login-left d-none d-md-flex">
                        <h2 class="fw-bolder mb-3"><i class="bi bi-rocket-takeoff-fill text-light me-2"></i>SohojSell</h2>
                        <h4 class="fw-bold opacity-75 mb-4">Step 1: Create Account</h4>
                        <ul class="list-unstyled opacity-75 mt-4">
                            <li class="mb-3"><i class="bi bi-check-circle-fill text-light me-2"></i> 14 Days Free Trial</li>
                            <li class="mb-3"><i class="bi bi-check-circle-fill text-light me-2"></i> Register with Phone Number</li>
                        </ul>
                    </div>
                    <div class="col-md-6 login-right">
                        <div class="text-center mb-4">
                            <h3 class="fw-bolder text-dark">Register 🚀</h3>
                            <p class="text-muted small">ফোন নম্বর দিয়ে একাউন্ট তৈরি করুন</p>
                        </div>
                        {% if messages %}
                            {% for message in messages %}
                                <div class="alert alert-{{ message.tags }} alert-dismissible fade show rounded-3 small">{{ message }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
                            {% endfor %}
                        {% endif %}

                        <form method="POST" action="{% url 'signup' %}">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary small">Mobile Number</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-telephone-fill"></i></span>
                                    <input type="text" name="phone" class="form-control border-start-0" placeholder="e.g. 01712345678" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary small">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-lock-fill"></i></span>
                                    <input type="password" name="password" class="form-control border-start-0" placeholder="Create a password" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold text-secondary small">Retype Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-lock-fill"></i></span>
                                    <input type="password" name="confirm_password" class="form-control border-start-0" placeholder="Retype password" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-signup w-100 shadow-sm"><i class="bi bi-arrow-right-circle-fill me-2"></i> Next: Setup Shop</button>
                        </form>
                        <div class="text-center mt-4 pt-3 border-top">
                            <p class="text-muted small mb-0">আগে থেকেই একাউন্ট আছে? <a href="/accounts/login/" class="fw-bold text-decoration-none" style="color: #fd7e14;">Login Here</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
